<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music App</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1db954" />
  </head>
  <body>
    <div class="sidebar">
      <h1>🎵 My Music</h1>
      <nav>
        <button class="nav-btn active" onclick="showSection('library')">
          Library
        </button>
        <button class="nav-btn" onclick="showSection('upload')">Upload</button>
      </nav>
    </div>

    <div class="main">
      <!-- Library Section -->
      <div id="library" class="section">
        <h2>Your Songs</h2>
        <input
          type="text"
          id="search-bar"
          class="search-bar"
          placeholder="🔍 Search songs or artists..."
          oninput="filterSongs()"
        />
        <div id="song-list" class="song-list">
          <p class="empty-msg">No songs yet. Upload some!</p>
        </div>
      </div>

      <!-- Upload Section -->
      <div id="upload" class="section hidden">
        <h2>Upload a Song</h2>
        <div class="upload-form">
          <input type="text" id="title" placeholder="Title *" required />
          <input type="text" id="artist" placeholder="Artist" />
          <input type="text" id="album" placeholder="Album" />
          <input type="text" id="genre" placeholder="Genre" />
          <input type="file" id="song-file" accept="audio/*" />
          <button onclick="uploadSong()">Upload</button>
          <p id="upload-status"></p>
        </div>
      </div>
    </div>

    <!-- Player Bar -->
    <div class="player-bar" id="player-bar">
      <div class="player-info">
        <span id="player-title">No song playing</span>
        <span id="player-artist"></span>
      </div>
      <div class="player-controls">
        <button class="skip-btn" onclick="playPrevious()" title="Previous">
          ⏮
        </button>
        <audio id="audio-player" controls></audio>
        <button class="skip-btn" onclick="playNext()" title="Next">⏭</button>
      </div>
      <div class="player-extra">
        <button id="shuffle-btn" onclick="toggleShuffle()" title="Shuffle: OFF">
          ⇄
        </button>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
